{% set name = "logrun" %}
{% set version = "0.2.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/logrun-{{ version }}.tar.gz
  sha256: 38b3ca86514d797998c838cfb863af7e7fcdef5d36f1972c99624551ac39f7f2

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - dill
    - git
    - gitpython
    - psutil
    - python >={{ python_min }}
    - python-xxhash

test:
  imports:
    - logrun
    - logrun.utils
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dccsillag/logrun
  summary: A convenient experiment logging package for Python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dccsillag
